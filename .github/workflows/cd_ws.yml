name: Deploy websocket

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.ws
          push: true
          tags: nirajkr26/ci_cd_learn_ws:${{ github.sha }}

      - name: Deploy to VM
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/ssh_key
          chmod 600 ~/ssh_key

          ssh -o StrictHostKeyChecking=no -i ~/ssh_key ubuntu@13.48.248.23 << 'EOF'
            docker stop cicd_ws || true
            docker rm cicd_ws || true
            docker pull nirajkr26/ci_cd_learn_ws:${{ github.sha }}

            docker run -d \
              --name cicd_ws \
              -p 8081:8080 \
              --restart unless-stopped \
              nirajkr26/ci_cd_learn_ws:${{ github.sha }}
          EOF